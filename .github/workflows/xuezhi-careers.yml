name: Xuezhi Careers Crawler

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "scripts/crawl-xuezhi-careers.py"
      - "sites/xuezhi/**"
      - "sites/core/**"
      - ".github/workflows/xuezhi-careers.yml"

permissions:
  contents: write
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"

jobs:
  run-xuezhi-careers:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          python -m playwright install --with-deps chromium

      - name: Run Xuezhi careers crawler
        id: run-crawler
        continue-on-error: true
        run: |
          python scripts/crawl-xuezhi-careers.py

      - name: Check output files
        id: check-output
        shell: bash
        run: |
          if [ -d data/xuezhi/careers ] && [ "$(find data/xuezhi/careers -type f | wc -l)" -gt 0 ]; then
            file_count=$(find data/xuezhi/careers -type f | wc -l | tr -d ' ')
            echo "status=success" >> "$GITHUB_OUTPUT"
            echo "file_count=$file_count" >> "$GITHUB_OUTPUT"
            echo "✅ Found $file_count output files in data/xuezhi/careers"
          else
            echo "status=no_file" >> "$GITHUB_OUTPUT"
            echo "file_count=0" >> "$GITHUB_OUTPUT"
            echo "⚠️ data/xuezhi/careers directory not found or empty"
            exit 1
          fi

      - name: Show changed files
        if: steps.check-output.outputs.status == 'success'
        shell: bash
        run: |
          echo "===== git status ====="
          git status --short || true
          echo
          echo "===== generated files ====="
          find data/xuezhi/careers -maxdepth 3 -type f | sort || true

      - name: Configure git
        if: steps.check-output.outputs.status == 'success'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and push
        if: steps.check-output.outputs.status == 'success'
        shell: bash
        run: |
          git add -f data/xuezhi/careers/

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🤖 xuezhi-careers: $(date +%Y-%m-%d\ %H:%M:%S)"
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            git push origin HEAD:"${GITHUB_REF_NAME}"
          fi

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xuezhi-careers-output
          path: data/xuezhi/careers/
          if-no-files-found: warn
          retention-days: 7
          overwrite: true