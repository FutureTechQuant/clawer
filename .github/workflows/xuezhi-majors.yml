name: Xuezhi Majors Crawler

on:
  workflow_dispatch:
    inputs:
      max_majors:
        description: "只抓前几个专业，0 表示不限制"
        required: false
        default: "2"
      scrape_details:
        description: "是否抓详情，1=是，0=否"
        required: false
        default: "1"
  push:
    branches:
      - main
    paths:
      - "scripts/crawl-xuezhi-majors.py"
      - "sites/xuezhi/**"
      - "sites/core/**"
      - ".github/workflows/xuezhi-majors.yml"

permissions:
  contents: write
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"

jobs:
  run-xuezhi-majors:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          python -m playwright install --with-deps chromium

      - name: Run Xuezhi majors crawler
        id: run-crawler
        continue-on-error: true
        env:
          SCRAPE_DETAILS: ${{ github.event.inputs.scrape_details || '1' }}
          MAX_MAJORS: ${{ github.event.inputs.max_majors || '2' }}
        run: |
          echo "SCRAPE_DETAILS=$SCRAPE_DETAILS"
          echo "MAX_MAJORS=$MAX_MAJORS"
          python -m scripts.crawl_xuezhi_majors

      - name: Check output files
        id: check-output
        shell: bash
        run: |
          if [ -d data/xuezhi/majors ] && [ "$(find data/xuezhi/majors -type f | wc -l)" -gt 0 ]; then
            file_count=$(find data/xuezhi/majors -type f | wc -l | tr -d ' ')
            echo "status=success" >> "$GITHUB_OUTPUT"
            echo "file_count=$file_count" >> "$GITHUB_OUTPUT"
            echo "✅ Found $file_count output files in data/xuezhi/majors"
          else
            echo "status=no_file" >> "$GITHUB_OUTPUT"
            echo "file_count=0" >> "$GITHUB_OUTPUT"
            echo "⚠️ data/xuezhi/majors directory not found or empty"
            exit 1
          fi

      - name: Show changed files
        if: steps.check-output.outputs.status == 'success'
        shell: bash
        run: |
          echo "===== git status ====="
          git status --short || true
          echo
          echo "===== generated files ====="
          find data/xuezhi/majors -maxdepth 3 -type f | sort || true

      - name: Configure git
        if: steps.check-output.outputs.status == 'success'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and push
        if: steps.check-output.outputs.status == 'success'
        shell: bash
        run: |
          git add -f data/xuezhi/majors/

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🤖 xuezhi-majors: $(date +%Y-%m-%d\ %H:%M:%S)"
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            git push origin HEAD:"${GITHUB_REF_NAME}"
          fi

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xuezhi-majors-output
          path: data/xuezhi/majors/
          if-no-files-found: warn
          retention-days: 7
          overwrite: true